packages:
    - ./package
    - ./test

autoInstallPeers: false
strictPeerDependencies: false

catalogs:
    dev:
        unstorage: ^1.17.0
    peer:
        unstorage: ^1.17.0

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
    # config
    - "@apst/biome"
    - "@apst/tsconfig"
    - "@apst/tsdown"
    # tsdown
    - "@tsdown/*"
    - "tsdown"
